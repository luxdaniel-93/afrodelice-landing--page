 <!-- AFD-6 : Section Réservation -->

<section id="reservation" class="container py-5">
        <h2 class="text-center mb-4">Réservez une table</h2>
        <form id="reservationForm" class="row g-3">
            <div class="col-md-6">
                <label for="name" class="form-label">Nom</label>
                <input type="text" id="name" name="name" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label for="email" class="form-label">Email</label>
                <input type="email" id="email" name="email" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label for="date" class="form-label">Date</label>
                <input type="date" id="date" name="date" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label for="time" class="form-label">Heure</label>
                <input type="time" id="time" name="time" class="form-control" required>
            </div>
            <div class="col-md-6">
                <label for="guests" class="form-label">Nombre de personnes</label>
                <input type="number" id="guests" name="guests" class="form-control" min="1" required>
            </div>
            <div class="col-12">
                <button type="submit" class="btn btn-success w-100">Réserver</button>
            </div>
        </form>
        <!-- Zone pour message -->
        <div id="formMessage" class="mt-3"></div>
    </section>
